<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Button</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    .button-link {
      display: inline-block;
      line-height: 0;
    }

    img {
      display: block;
      width: 280px;
      max-width: 100%;
      height: auto;
      border: 0;
    }
  </style>
</head>
<body>
  <a class="button-link" href="https://shvim.github.io/hidden-prize-puzzle/" target="_blank">
    <img src="https://shvim.github.io/hidden-prize-puzzle/assets/click-here.jpg" alt="Click here">
  </a>
</body>
</html>
